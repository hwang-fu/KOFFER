name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.svg"
      - "**/*.ico"
      - "**/*.webp"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host:
    name: host (ubuntu-latest)
    if: ${{ !startsWith(github.event.head_commit.message, 'docs') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install C toolchain (cmake for liboqs, libclang for bindgen)
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev
      - name: Provision pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  embedded:
    name: embedded (thumbv8m.main-none-eabihf)
    if: ${{ !startsWith(github.event.head_commit.message, 'docs') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Provision pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build (no_std, Cortex-M33F)
        run: cargo build --target thumbv8m.main-none-eabihf -p koffer-wire -p koffer-crypto

  fmt:
    name: rustfmt (nightly)
    if: ${{ !startsWith(github.event.head_commit.message, 'docs') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --profile minimal --component rustfmt --no-self-update
      - name: Format (nightly rustfmt)
        run: cargo +nightly fmt --all --check
