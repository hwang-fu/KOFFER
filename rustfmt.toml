# Formatting uses nightly rustfmt: run `cargo +nightly fmt`. CI checks it on nightly too.
# The options below the blank line are unstable (nightly-only); stable rustfmt warns and
# ignores them, so do not format with stable.

edition = "2024"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_field_init_shorthand = true
reorder_imports = true
merge_derives = false
use_small_heuristics = "Default"

# Unstable (nightly-only) options.
group_imports = "StdExternalCrate"
imports_granularity = "Crate"
format_code_in_doc_comments = true
format_macro_matchers = true
